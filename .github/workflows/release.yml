name: Desktop/native release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-native:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[packaging,dev]"

      - name: Run tests
        run: python -m pytest

      - name: Build native executable
        run: >
          python scripts/build_native.py
          --app-name radlex-harmonize
          --project-name radlex-order-harmonizer
          --module radlex_order_harmonizer.cli
          --package radlex_order_harmonizer

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: radlex-harmonize-${{ runner.os }}-${{ runner.arch }}
          path: dist/native/*

  github-release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and attach binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" artifacts/* \
            --title "radlex-order-harmonizer ${GITHUB_REF_NAME}" \
            --notes "Native Windows, macOS, and Linux command-line builds generated by GitHub Actions. These builds map local radiology order names to RadLex Playbook candidates for review and adjudication."
